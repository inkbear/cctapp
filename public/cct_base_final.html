<!DOCTYPE html>
<html>
  <head>
    <title>CCT App</title>
    <script src="jspsych/jspsych.js"></script>
    <script src="jspsych/plugins/jspsych-html-keyboard-response.js"></script>
    <script src="jspsych/plugins/jspsych-audio-button-response.js"></script>
    <script src="storage/cct/english/v2/trial_info.js"></script>
    <link href="jspsych/css/jspsych.css" rel="stylesheet" type="text/css"></link>
    <link href="css/cct.css" rel="stylesheet" type="text/css"></link>
  </head>
  <body>
    <div id="jspsych-target"></div>
  </body>
  <script>
   

    /* create timeline */
    var timeline = [];   

    /* timeline variables are loaded from trial_info.js */
    
    // create arrays for preloading audio
    var train_audio = [];
    for (var i=0; i<train_info.length; i++) {
        train_audio.push(train_info[i].prompt_audio);
        train_audio.push(train_info[i].feedback_audio);
    }

    var train_images = [];
    for (var i=0; i<train_info.length; i++) {
        train_images.push(train_info[i].target_image);
        train_images.push(train_info[i].distractor_image);
    }

    var test_audio = [];
    for (var i=0; i<test_info.length; i++) {
        test_audio.push(test_info[i].prompt_audio);
        test_audio.push(test_info[i].feedback_audio);
    }

    var test_images = [];
    for (var i=0; i<test_info.length; i++) {
        test_images.push(test_info[i].target_image);
        test_images.push(test_info[i].distractor_image);
    }
    
    // create a single array for all the images and a single array for all the audio
    var all_audio = train_audio.concat(test_audio);
    var all_images = train_images.concat(test_images);

    /* welcome message and start train  */
    var start_train = {
        type: "html-keyboard-response",
        stimulus: "Welcome to the CCT App. Press any key to start the training phase. ",
        data: {
            trial_part: 'start_train',
        }
    };
    timeline.push(start_train);

    /*  feedback trial plays audio feedback based on if_node trial */
    var feedback = {
        type: 'audio-button-response',
        stimulus: jsPsych.timelineVariable('feedback_audio'),   

        /* section: be sure this section matches the main_trial settings so the images stay put */
        choices: ['', ''], // button labels need to exist but are not displayed or stored
        button_html: [
            jsPsych.timelineVariable('target_image_button'),
            jsPsych.timelineVariable('distractor_image_button')
        ],
        margin_horizontal: "40px",
        /* end section */

        trial_ends_after_audio: true,
        data: {
            trial_part: 'feedback',
        },
    }

    /* main_trial loads two images as buttons and plays the audio prompt */
    var main_trial = {
        type: 'audio-button-response',
        stimulus: jsPsych.timelineVariable('prompt_audio'),
                
        /* section: be sure this section matches the main_trial settings so the images stay put */
        choices: ['', ''], // button labels need to exist but are not displayed or stored
        button_html: [
            jsPsych.timelineVariable('target_image_button'),
            jsPsych.timelineVariable('distractor_image_button')
        ],
        margin_horizontal: "40px",
        /* end section */

        trial_duration: 70000, // move on after 7 seconds
        data: {
            trial_part: 'test',
            target: jsPsych.timelineVariable('target'),
            distractor: jsPsych.timelineVariable('distractor'),
        },
        on_finish: function(data){
            if(data.button_pressed == 0){
                data.correct = true; 
            } else {
                data.correct = false;
            }
        },
    }

    /* decison trial for routing to audio feedback trial if the correct response was given in the previous trial (main_trial) */
    var if_node = {
        timeline: [feedback],
        conditional_function: function(){
            var correct = jsPsych.data.get().last(1).values()[0].correct;
            if(correct){
                return true;
            } else {
                return false;
            }
        }
    }
    
    /* blank_interval was added since feedback may or may not occur at the end fo the main_trail */
    var blank_interval = {
        type: "html-keyboard-response",
        stimulus: '',
        data: {
            trial_part: 'blank_interval',
        },
        trial_duration: 1000,
    };

    /* trial wrapper contains main_trial, the conditional for loading feedback audio, and a post trial blanking interval */
    /* Make the first wrapper for the training sequence */
    var train_wrapper = {
        timeline_variables: train_info,
        timeline: [main_trial, if_node, blank_interval],
        repetitions: 1
    }
    timeline.push(train_wrapper);

    /* next phase message trial  */
    var start_test = {
        type: "html-keyboard-response",
        stimulus: "Training phase complete. Press any key to start test phase. ",
        data: {
            trial_part: 'start_test',
        }
    };
    timeline.push(start_test);

    /* Make a second trail for the test sequence */
    var test_wrapper = {
        timeline_variables: test_info,
        timeline: [main_trial, if_node, blank_interval],
        repetitions: 1
    }
    timeline.push(test_wrapper);

    /* next phase message trial  */
    var start_reliablity = {
        type: "html-keyboard-response",
        stimulus: "Test phase complete. Press any key to start reliablity phase. ",
        data: {
            trial_part: 'start_reliablity',
        }
    };
    timeline.push(start_reliablity);

    /* Make a third wrapper for the reliablity sequence */
    var reliablity_info = test_info.slice(0);;
    reliablity_info.reverse();
    var reliablity_wrapper = {
        timeline_variables: reliablity_info,
        timeline: [main_trial, if_node, blank_interval],
        repetitions: 1
    }
    timeline.push(reliablity_wrapper);

    /* exit message trial  */
    var exit = {
        type: "html-keyboard-response",
        stimulus: "Please exit through the gift shop. Press any key to continue. ",
        data: {
            trial_part: 'exit',
        }
    };
    timeline.push(exit);
    
    /* add meta data related to the entire experiment */
    jsPsych.data.addProperties({
        // live will use tokens here
        subject: 1, 
        version: 'cct_en_v1'
    });
    
    /* log the start time/date for the experiment */
    var start_time = jsPsych.startTime();

    /* start the experiment */
    jsPsych.init({
        timeline: timeline,
        preload_audio: all_audio,
        preload_images: all_images,
        display_element: 'jspsych-target',
        show_progress_bar: false,
        randomize_order: false,
        use_webaudio: false,
        // show the raw json data - to be removed for live
        on_finish: function() {
            jsPsych.data.displayData();
        }
    });

  </script>
</html>
